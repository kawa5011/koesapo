<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>こえサポ - 意思疎通支援ツール</title>
<style>
/* ===== CSS Variables ===== */
:root {
  --bg: #f0f4f8;
  --surface: #ffffff;
  --text: #1a202c;
  --text-secondary: #4a5568;
  --text-on-btn: #ffffff;
  --border: #e2e8f0;
  --shadow: rgba(0,0,0,0.1);
  --accent: #3182ce;
  --accent-hover: #2b6cb0;
  --header-bg: #ffffff;

  --cat-basic: #3182ce;
  --cat-basic-hover: #2b6cb0;
  --cat-body: #ed8936;
  --cat-body-hover: #dd6b20;
  --cat-request: #805ad5;
  --cat-request-hover: #6b46c1;
  --cat-care: #d69e2e;
  --cat-care-hover: #b7791f;
  --cat-fav: #e53e3e;
  --cat-fav-hover: #c53030;

  --btn-green: #38a169;
  --btn-green-hover: #2f855a;
  --btn-red: #e53e3e;
  --btn-red-hover: #c53030;
  --btn-orange: #ed8936;
  --btn-orange-hover: #dd6b20;
  --btn-purple: #805ad5;
  --btn-purple-hover: #6b46c1;
  --btn-yellow: #d69e2e;
  --btn-yellow-hover: #b7791f;
  --btn-blue: #3182ce;
  --btn-blue-hover: #2b6cb0;
  --btn-pink: #d53f8c;
  --btn-pink-hover: #b83280;

  --overlay-bg: rgba(0,0,0,0.5);
  --settings-bg: #ffffff;
  --spoken-bg: #ebf4ff;
  --spoken-border: #3182ce;
  --spoken-text: #2b6cb0;
  --progress-bg: rgba(255,255,255,0.35);
}

[data-theme="dark"] {
  --bg: #1a202c;
  --surface: #2d3748;
  --text: #f7fafc;
  --text-secondary: #a0aec0;
  --text-on-btn: #ffffff;
  --border: #4a5568;
  --shadow: rgba(0,0,0,0.4);
  --accent: #63b3ed;
  --accent-hover: #4299e1;
  --header-bg: #2d3748;

  --cat-basic: #4299e1;
  --cat-basic-hover: #3182ce;
  --cat-body: #f6ad55;
  --cat-body-hover: #ed8936;
  --cat-request: #b794f4;
  --cat-request-hover: #9f7aea;
  --cat-care: #f6e05e;
  --cat-care-hover: #ecc94b;
  --cat-fav: #fc8181;
  --cat-fav-hover: #f56565;

  --btn-green: #48bb78;
  --btn-green-hover: #38a169;
  --btn-red: #fc8181;
  --btn-red-hover: #f56565;
  --btn-orange: #f6ad55;
  --btn-orange-hover: #ed8936;
  --btn-purple: #b794f4;
  --btn-purple-hover: #9f7aea;
  --btn-yellow: #f6e05e;
  --btn-yellow-hover: #ecc94b;
  --btn-blue: #63b3ed;
  --btn-blue-hover: #4299e1;
  --btn-pink: #f687b3;
  --btn-pink-hover: #ed64a6;

  --overlay-bg: rgba(0,0,0,0.7);
  --settings-bg: #2d3748;
  --spoken-bg: rgba(99,179,237,0.15);
  --spoken-border: #63b3ed;
  --spoken-text: #90cdf4;
  --progress-bg: rgba(255,255,255,0.25);
}

/* ===== Reset ===== */
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}

/* ===== App Layout ===== */
.app {
  display: flex;
  flex-direction: column;
  height: 100%;
  height: 100dvh;
}

/* ===== Header ===== */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 12px;
  background: var(--header-bg);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  min-height: 48px;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.back-btn {
  display: none;
  align-items: center;
  justify-content: center;
  width: 48px;
  height: 48px;
  border: none;
  border-radius: 12px;
  background: var(--accent);
  color: white;
  font-size: 1.5rem;
  cursor: pointer;
}

.back-btn.visible { display: flex; }

.header-title {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--text);
}

.header-actions {
  display: flex;
  gap: 6px;
}

.icon-btn {
  width: 42px;
  height: 42px;
  border: none;
  border-radius: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 1.15rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ===== Last Spoken — Fixed Top ===== */
.spoken-bar {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 10px 16px;
  background: var(--spoken-bg);
  border-bottom: 3px solid var(--spoken-border);
  min-height: 56px;
}

.spoken-bar.empty { opacity: 0.5; }

.spoken-text {
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--spoken-text);
  flex: 1;
  text-align: center;
}

.repeat-btn {
  padding: 10px 20px;
  border: 3px solid var(--spoken-border);
  border-radius: 12px;
  background: transparent;
  color: var(--spoken-text);
  font-size: 1.1rem;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  min-width: 100px;
  min-height: 48px;
}

.repeat-btn:active {
  background: var(--spoken-border);
  color: white;
}

/* ===== Content Area ===== */
.content {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 12px;
}

/* ===== Category Home Screen ===== */
.category-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
  max-width: 900px;
  margin: 0 auto;
}

.cat-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  border: none;
  border-radius: 20px;
  font-size: 1.8rem;
  font-weight: 800;
  color: var(--text-on-btn);
  cursor: pointer;
  padding: 24px 16px;
  min-height: 140px;
  box-shadow: 0 6px 20px var(--shadow);
  transition: transform 0.1s;
}

.cat-btn:active { transform: scale(0.96); }

.cat-btn .cat-icon { font-size: 2.2rem; margin-bottom: 8px; }
.cat-btn .cat-count { font-size: 0.9rem; font-weight: 500; opacity: 0.8; margin-top: 4px; }

.cat-basic { background: var(--cat-basic); }
.cat-basic:active { background: var(--cat-basic-hover); }
.cat-body { background: var(--cat-body); }
.cat-body:active { background: var(--cat-body-hover); }
.cat-request { background: var(--cat-request); }
.cat-request:active { background: var(--cat-request-hover); }
.cat-care { background: var(--cat-care); color: #1a202c; }
.cat-care:active { background: var(--cat-care-hover); }
.cat-fav { background: var(--cat-fav); }
.cat-fav:active { background: var(--cat-fav-hover); }

/* ===== Item Buttons ===== */
.item-grid {
  display: grid;
  gap: 12px;
  max-width: 900px;
  margin: 0 auto;
}

.item-grid.cols-1 { grid-template-columns: 1fr; }
.item-grid.cols-2 { grid-template-columns: repeat(2, 1fr); }

.comm-btn {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  border: none;
  border-radius: 18px;
  font-size: 2rem;
  font-weight: 700;
  color: var(--text-on-btn);
  cursor: pointer;
  padding: 20px 16px;
  min-height: 120px;
  box-shadow: 0 5px 16px var(--shadow);
  overflow: hidden;
  line-height: 1.3;
}

.comm-btn .progress {
  position: absolute;
  left: 0; bottom: 0;
  height: 100%;
  width: 0%;
  background: var(--progress-bg);
  border-radius: 18px;
  pointer-events: none;
}

.comm-btn .btn-text {
  position: relative;
  z-index: 2;
}

.comm-btn .fav-star {
  position: absolute;
  top: 8px; right: 10px;
  font-size: 1.2rem;
  z-index: 3;
  opacity: 0.7;
}

/* Speaking state */
.comm-btn.speaking {
  animation: glow 0.6s ease-in-out infinite alternate;
}

@keyframes glow {
  from { box-shadow: 0 0 0 5px rgba(255,255,255,0.4), 0 5px 16px var(--shadow); }
  to { box-shadow: 0 0 0 8px rgba(255,255,255,0.7), 0 5px 30px var(--shadow); }
}

/* Button colors */
.btn-green { background: var(--btn-green); }
.btn-red { background: var(--btn-red); }
.btn-orange { background: var(--btn-orange); }
.btn-purple { background: var(--btn-purple); }
.btn-yellow { background: var(--btn-yellow); color: #1a202c; }
.btn-blue { background: var(--btn-blue); }
.btn-pink { background: var(--btn-pink); }

/* ===== Column Toggle ===== */
.view-toggle {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  margin-bottom: 10px;
  max-width: 900px;
  margin-left: auto;
  margin-right: auto;
}

.view-toggle-btn {
  width: 44px; height: 44px;
  border: 2px solid var(--border);
  border-radius: 10px;
  background: var(--surface);
  color: var(--text);
  font-size: 1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.view-toggle-btn.active {
  border-color: var(--accent);
  background: var(--accent);
  color: white;
}

/* ===== Settings Overlay ===== */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--overlay-bg);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 16px;
}

.overlay.open { display: flex; }

.settings-panel {
  background: var(--settings-bg);
  border-radius: 20px;
  padding: 24px;
  width: 100%;
  max-width: 600px;
  max-height: 85vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  color: var(--text);
}

.settings-panel h2 { font-size: 1.3rem; margin-bottom: 20px; }

.settings-section { margin-bottom: 24px; }
.settings-section h3 { font-size: 1.05rem; margin-bottom: 12px; color: var(--text-secondary); }

.setting-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
  gap: 12px;
}

.setting-row label { font-size: 1rem; font-weight: 600; }

.toggle { position: relative; width: 52px; height: 28px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; }

.toggle-slider {
  position: absolute; inset: 0;
  background: var(--border);
  border-radius: 28px;
  cursor: pointer;
  transition: background 0.3s;
}

.toggle-slider::before {
  content: '';
  position: absolute;
  width: 22px; height: 22px;
  left: 3px; top: 3px;
  background: white;
  border-radius: 50%;
  transition: transform 0.3s;
}

.toggle input:checked + .toggle-slider { background: var(--accent); }
.toggle input:checked + .toggle-slider::before { transform: translateX(24px); }

.speed-control { display: flex; align-items: center; gap: 10px; }

.speed-control input[type="range"] {
  flex: 1; height: 8px;
  -webkit-appearance: none;
  background: var(--border);
  border-radius: 4px;
  outline: none;
}

.speed-control input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
}

.speed-label { min-width: 80px; text-align: center; font-weight: 600; font-size: 0.9rem; }

.edit-category { margin-bottom: 18px; }
.edit-category h4 { font-size: 1rem; margin-bottom: 8px; color: var(--accent); }

.edit-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }

.edit-item input {
  flex: 1; padding: 12px;
  border: 2px solid var(--border);
  border-radius: 10px;
  font-size: 1rem;
  background: var(--bg);
  color: var(--text);
}

.edit-item input:focus { outline: none; border-color: var(--accent); }

.small-btn {
  padding: 10px 14px;
  border: none; border-radius: 10px;
  font-size: 0.9rem; font-weight: 600;
  cursor: pointer; white-space: nowrap;
  min-height: 44px;
}

.btn-danger { background: var(--btn-red); color: white; }
.btn-add { background: var(--accent); color: white; width: 100%; padding: 12px; margin-top: 4px; }

.settings-footer { display: flex; gap: 12px; margin-top: 20px; }

.settings-footer button {
  flex: 1; padding: 16px;
  border: none; border-radius: 14px;
  font-size: 1.1rem; font-weight: 700;
  cursor: pointer; min-height: 54px;
}

.btn-save { background: var(--accent); color: white; }
.btn-cancel { background: var(--surface); color: var(--text); border: 2px solid var(--border); }

/* ===== Landscape ===== */
@media (orientation: landscape) {
  .category-grid { grid-template-columns: repeat(3, 1fr); }
  .cat-btn { min-height: 110px; font-size: 1.5rem; }
  .comm-btn { min-height: 100px; font-size: 1.6rem; }
  .item-grid.cols-2 { grid-template-columns: repeat(3, 1fr); }
}

@media (min-width: 1024px) {
  .category-grid { grid-template-columns: repeat(3, 1fr); gap: 18px; }
  .cat-btn { min-height: 160px; font-size: 2rem; }
  .comm-btn { min-height: 140px; font-size: 2.2rem; }
}

@media (max-width: 400px) {
  .cat-btn { min-height: 110px; font-size: 1.4rem; padding: 16px 10px; }
  .comm-btn { font-size: 1.5rem; min-height: 100px; padding: 16px 10px; }
}

:fullscreen .app, :-webkit-full-screen .app { height: 100vh; }
</style>
</head>
<body>
<div class="app" id="app">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <button class="back-btn" id="btnBack" aria-label="戻る">←</button>
      <div class="header-title" id="headerTitle">こえサポ</div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="btnFullscreen" title="全画面" aria-label="全画面表示">⛶</button>
      <button class="icon-btn" id="btnTheme" title="テーマ切替" aria-label="テーマ切替">🌙</button>
      <button class="icon-btn" id="btnSettings" title="設定" aria-label="設定">⚙</button>
    </div>
  </div>

  <!-- Last Spoken Bar (always visible at top) -->
  <div class="spoken-bar empty" id="spokenBar">
    <span class="spoken-text" id="spokenText">ここに発話内容が表示されます</span>
    <button class="repeat-btn" id="btnRepeat">もう一度</button>
  </div>

  <!-- Content -->
  <div class="content" id="content"></div>
</div>

<!-- Settings Overlay -->
<div class="overlay" id="settingsOverlay">
  <div class="settings-panel" id="settingsPanel">
    <h2>設定</h2>

    <div class="settings-section">
      <h3>操作</h3>
      <div class="setting-row">
        <label>長押しで確定</label>
        <label class="toggle">
          <input type="checkbox" id="toggleLongPress" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="setting-row" id="rowHoldDuration">
        <label>長押し時間</label>
        <div class="speed-control">
          <span class="speed-label" id="holdLabel">0.7秒</span>
          <input type="range" id="holdSlider" min="300" max="1500" step="100" value="700">
        </div>
      </div>
    </div>

    <div class="settings-section">
      <h3>音声</h3>
      <div class="setting-row">
        <label>読み上げ速度</label>
        <div class="speed-control">
          <span class="speed-label" id="speedLabel">ゆっくり</span>
          <input type="range" id="speedSlider" min="0.5" max="1.5" step="0.1" value="0.8">
        </div>
      </div>
      <div class="setting-row">
        <label>音声の高さ</label>
        <div class="speed-control">
          <span class="speed-label" id="pitchLabel">普通</span>
          <input type="range" id="pitchSlider" min="0.5" max="2.0" step="0.1" value="1.0">
        </div>
      </div>
    </div>

    <div class="settings-section">
      <h3>選択肢の編集</h3>
      <div id="editArea"></div>
    </div>

    <div class="settings-footer">
      <button class="btn-cancel" id="btnSettingsCancel">キャンセル</button>
      <button class="btn-save" id="btnSettingsSave">保存</button>
    </div>
  </div>
</div>

<script>
// ===== Default Data =====
const DEFAULT_DATA = {
  categories: [
    {
      name: "基本応答", icon: "💬", colorClass: "cat-basic",
      items: [
        { text: "はい", color: "green" },
        { text: "いいえ", color: "red" },
        { text: "わからない", color: "blue" },
        { text: "もう一度言ってください", color: "blue" },
        { text: "ありがとう", color: "green" },
        { text: "大丈夫", color: "green" }
      ]
    },
    {
      name: "体調", icon: "🩺", colorClass: "cat-body",
      items: [
        { text: "痛い", color: "red" },
        { text: "苦しい", color: "red" },
        { text: "気持ち悪い", color: "orange" },
        { text: "寒い", color: "blue" },
        { text: "暑い", color: "orange" },
        { text: "問題ない", color: "green" }
      ]
    },
    {
      name: "要望", icon: "🙏", colorClass: "cat-request",
      items: [
        { text: "水が飲みたい", color: "blue" },
        { text: "体勢を変えたい", color: "purple" },
        { text: "トイレ", color: "purple" },
        { text: "テレビをつけて", color: "blue" },
        { text: "電気を消して", color: "blue" },
        { text: "時間を教えて", color: "blue" }
      ]
    },
    {
      name: "介助依頼", icon: "🔔", colorClass: "cat-care",
      items: [
        { text: "看護師さんを呼んで", color: "yellow" },
        { text: "家族を呼んで", color: "yellow" },
        { text: "先生を呼んで", color: "yellow" },
        { text: "痰の吸引をして", color: "orange" },
        { text: "口を潤して", color: "blue" },
        { text: "背中をさすって", color: "purple" }
      ]
    }
  ],
  favorites: [],
  speed: 0.8,
  pitch: 1.0,
  theme: "light",
  longPress: true,
  holdDuration: 700,
  columns: 2
};

// ===== State =====
let data = loadData();
let currentView = "home";
let lastSpokenText = "";
let holdTimer = null;
let holdStartTime = 0;
let holdAnimFrame = null;
let currentHoldBtn = null;

// ===== Persistence =====
function loadData() {
  try {
    const saved = localStorage.getItem("koesapo_v2");
    if (saved) {
      const parsed = JSON.parse(saved);
      return { ...DEFAULT_DATA, ...parsed };
    }
  } catch (e) {}
  return JSON.parse(JSON.stringify(DEFAULT_DATA));
}

function saveData() {
  try { localStorage.setItem("koesapo_v2", JSON.stringify(data)); } catch (e) {}
}

// ===== Theme =====
function applyTheme() {
  document.documentElement.setAttribute("data-theme", data.theme);
  document.getElementById("btnTheme").textContent = data.theme === "dark" ? "☀" : "🌙";
}

function toggleTheme() {
  data.theme = data.theme === "dark" ? "light" : "dark";
  applyTheme();
  saveData();
}

// ===== Speech =====
let speechUnlocked = false;
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

function loadVoices() {
  if ("speechSynthesis" in window) window.speechSynthesis.getVoices();
}

// iOS Safari requires speechSynthesis to be triggered directly from a user gesture.
// This function "unlocks" it with a silent utterance on the first touch.
function unlockSpeech() {
  if (speechUnlocked || !("speechSynthesis" in window)) return;
  const silent = new SpeechSynthesisUtterance("");
  silent.volume = 0;
  silent.lang = "ja-JP";
  window.speechSynthesis.speak(silent);
  speechUnlocked = true;
}

// Unlock on any first touch/click
document.addEventListener("touchstart", unlockSpeech, { once: true });
document.addEventListener("click", unlockSpeech, { once: true });

function speak(text, btnEl) {
  if (!("speechSynthesis" in window)) {
    alert("このブラウザは音声合成に対応していません");
    return;
  }
  window.speechSynthesis.cancel();

  // iOS workaround: small delay after cancel to ensure it works
  const doSpeak = () => {
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = "ja-JP";
    utter.rate = data.speed;
    utter.pitch = data.pitch;

    const voices = window.speechSynthesis.getVoices();
    const jaVoice = voices.find(v => v.lang.startsWith("ja"));
    if (jaVoice) utter.voice = jaVoice;

    if (btnEl) {
      btnEl.classList.add("speaking");
      utter.onend = () => btnEl.classList.remove("speaking");
      utter.onerror = () => btnEl.classList.remove("speaking");
      setTimeout(() => btnEl.classList.remove("speaking"), 5000);
    }

    window.speechSynthesis.speak(utter);
    lastSpokenText = text;
    updateSpokenBar(text);
  };

  if (isIOS) {
    setTimeout(doSpeak, 50);
  } else {
    doSpeak();
  }
}

function updateSpokenBar(text) {
  const bar = document.getElementById("spokenBar");
  document.getElementById("spokenText").textContent = "💬 " + text;
  bar.classList.remove("empty");
}

// ===== Favorites =====
function isFavorite(text) { return data.favorites.includes(text); }

function toggleFavorite(text) {
  const idx = data.favorites.indexOf(text);
  if (idx >= 0) data.favorites.splice(idx, 1);
  else data.favorites.push(text);
  saveData();
  render();
}

function getFavoriteItems() {
  const items = [];
  data.categories.forEach(cat => {
    cat.items.forEach(item => {
      if (data.favorites.includes(item.text)) items.push({ ...item });
    });
  });
  return items;
}

// ===== Long Press =====
let holdInterval = null;

function startHold(btn, text, progressEl) {
  // Always unlock speech on user gesture
  unlockSpeech();

  if (!data.longPress) {
    speak(text, btn);
    return;
  }
  currentHoldBtn = btn;
  holdStartTime = Date.now();

  // Use setInterval instead of rAF for iOS compatibility
  if (holdInterval) clearInterval(holdInterval);
  holdInterval = setInterval(() => {
    const elapsed = Date.now() - holdStartTime;
    const pct = Math.min((elapsed / data.holdDuration) * 100, 100);
    progressEl.style.width = pct + "%";

    if (elapsed >= data.holdDuration) {
      clearInterval(holdInterval);
      holdInterval = null;
      progressEl.style.width = "0%";
      speak(text, btn);
      currentHoldBtn = null;
    }
  }, 16);
}

function cancelHold(progressEl) {
  if (holdInterval) { clearInterval(holdInterval); holdInterval = null; }
  if (holdAnimFrame) cancelAnimationFrame(holdAnimFrame);
  holdAnimFrame = null;
  holdStartTime = 0;
  currentHoldBtn = null;
  if (progressEl) progressEl.style.width = "0%";
}

// ===== Render =====
function render() {
  if (currentView === "home") renderHome();
  else renderCategory(currentView);
}

function renderHome() {
  const content = document.getElementById("content");
  document.getElementById("btnBack").classList.remove("visible");
  document.getElementById("headerTitle").textContent = "こえサポ";

  let html = '<div class="category-grid">';

  const favItems = getFavoriteItems();
  if (favItems.length > 0) {
    html += '<button class="cat-btn cat-fav" data-action="fav">' +
      '<span class="cat-icon">⭐</span>' +
      '<span>よく使う</span>' +
      '<span class="cat-count">' + favItems.length + '項目</span></button>';
  }

  data.categories.forEach((cat, i) => {
    html += '<button class="cat-btn ' + cat.colorClass + '" data-action="cat" data-index="' + i + '">' +
      '<span class="cat-icon">' + (cat.icon || '') + '</span>' +
      '<span>' + cat.name + '</span>' +
      '<span class="cat-count">' + cat.items.length + '項目</span></button>';
  });

  html += '</div>';
  content.innerHTML = html;

  content.querySelectorAll("[data-action='cat']").forEach(btn => {
    btn.addEventListener("click", () => { currentView = parseInt(btn.dataset.index); render(); });
  });
  content.querySelectorAll("[data-action='fav']").forEach(btn => {
    btn.addEventListener("click", () => { currentView = "favorites"; render(); });
  });
}

function renderCategory(catIndex) {
  const content = document.getElementById("content");
  document.getElementById("btnBack").classList.add("visible");

  let items, catName;
  if (catIndex === "favorites") {
    items = getFavoriteItems();
    catName = "⭐ よく使う";
  } else {
    const cat = data.categories[catIndex];
    items = cat.items;
    catName = (cat.icon || "") + " " + cat.name;
  }

  document.getElementById("headerTitle").textContent = catName;
  const cols = data.columns || 2;

  let html = '<div class="view-toggle">' +
    '<button class="view-toggle-btn ' + (cols === 1 ? 'active' : '') + '" data-cols="1">▮</button>' +
    '<button class="view-toggle-btn ' + (cols === 2 ? 'active' : '') + '" data-cols="2">▮▮</button></div>';

  html += '<div class="item-grid cols-' + cols + '">';

  items.forEach((item, idx) => {
    const fav = isFavorite(item.text);
    html += '<button class="comm-btn btn-' + (item.color || 'blue') + '" data-idx="' + idx + '">' +
      '<div class="progress"></div>' +
      '<span class="btn-text">' + item.text + '</span>' +
      '<span class="fav-star" data-fav="' + idx + '">' + (fav ? '★' : '☆') + '</span></button>';
  });

  html += '</div>';
  content.innerHTML = html;

  // Column toggle
  content.querySelectorAll("[data-cols]").forEach(btn => {
    btn.addEventListener("click", () => { data.columns = parseInt(btn.dataset.cols); saveData(); render(); });
  });

  // Item buttons
  content.querySelectorAll(".comm-btn").forEach(btn => {
    const text = btn.querySelector(".btn-text").textContent;
    const progressEl = btn.querySelector(".progress");

    btn.addEventListener("touchstart", (e) => {
      if (e.target.closest(".fav-star")) return;
      e.preventDefault();
      startHold(btn, text, progressEl);
    }, { passive: false });

    btn.addEventListener("touchend", (e) => {
      e.preventDefault();
      if (data.longPress && currentHoldBtn === btn) cancelHold(progressEl);
    });

    btn.addEventListener("touchcancel", () => cancelHold(progressEl));

    btn.addEventListener("mousedown", (e) => {
      if (e.target.closest(".fav-star")) return;
      startHold(btn, text, progressEl);
    });

    btn.addEventListener("mouseup", () => {
      if (data.longPress && currentHoldBtn === btn) cancelHold(progressEl);
    });

    btn.addEventListener("mouseleave", () => cancelHold(progressEl));
  });

  // Favorite stars
  content.querySelectorAll(".fav-star").forEach(star => {
    star.addEventListener("click", (e) => {
      e.stopPropagation();
      toggleFavorite(items[parseInt(star.dataset.fav)].text);
    });
    star.addEventListener("touchstart", (e) => e.stopPropagation());
    star.addEventListener("touchend", (e) => {
      e.stopPropagation();
      e.preventDefault();
      toggleFavorite(items[parseInt(star.dataset.fav)].text);
    });
  });
}

function goHome() { currentView = "home"; render(); }

function toggleFullscreen() {
  if (!document.fullscreenElement && !document.webkitFullscreenElement) {
    const el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  } else {
    if (document.exitFullscreen) document.exitFullscreen();
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
  }
}

// ===== Settings =====
function openSettings() {
  document.getElementById("toggleLongPress").checked = data.longPress;
  document.getElementById("holdSlider").value = data.holdDuration;
  updateHoldLabel(data.holdDuration);
  document.getElementById("speedSlider").value = data.speed;
  updateSpeedLabel(data.speed);
  document.getElementById("pitchSlider").value = data.pitch;
  updatePitchLabel(data.pitch);
  renderEditArea();
  document.getElementById("settingsOverlay").classList.add("open");
}

function closeSettings() {
  document.getElementById("settingsOverlay").classList.remove("open");
}

function renderEditArea() {
  const area = document.getElementById("editArea");
  area.innerHTML = "";

  data.categories.forEach((cat, ci) => {
    const div = document.createElement("div");
    div.className = "edit-category";
    const h4 = document.createElement("h4");
    h4.textContent = (cat.icon || "") + " " + cat.name;
    div.appendChild(h4);

    cat.items.forEach((item, ii) => {
      const row = document.createElement("div");
      row.className = "edit-item";
      const input = document.createElement("input");
      input.type = "text";
      input.value = item.text;
      input.dataset.cat = ci;
      input.dataset.item = ii;
      const delBtn = document.createElement("button");
      delBtn.className = "small-btn btn-danger";
      delBtn.textContent = "削除";
      delBtn.addEventListener("click", () => { data.categories[ci].items.splice(ii, 1); renderEditArea(); });
      row.appendChild(input);
      row.appendChild(delBtn);
      div.appendChild(row);
    });

    const addBtn = document.createElement("button");
    addBtn.className = "small-btn btn-add";
    addBtn.textContent = "＋ 追加";
    addBtn.addEventListener("click", () => { data.categories[ci].items.push({ text: "新しい項目", color: "blue" }); renderEditArea(); });
    div.appendChild(addBtn);
    area.appendChild(div);
  });
}

function saveSettings() {
  data.longPress = document.getElementById("toggleLongPress").checked;
  data.holdDuration = parseInt(document.getElementById("holdSlider").value);
  data.speed = parseFloat(document.getElementById("speedSlider").value);
  data.pitch = parseFloat(document.getElementById("pitchSlider").value);

  document.querySelectorAll("#editArea input[data-cat]").forEach(input => {
    const ci = parseInt(input.dataset.cat);
    const ii = parseInt(input.dataset.item);
    if (data.categories[ci] && data.categories[ci].items[ii]) {
      data.categories[ci].items[ii].text = input.value;
    }
  });

  saveData();
  render();
  closeSettings();
}

function updateSpeedLabel(v) {
  v = parseFloat(v);
  let l = v <= 0.6 ? "とてもゆっくり" : v <= 0.8 ? "ゆっくり" : v <= 1.1 ? "普通" : v <= 1.3 ? "速い" : "とても速い";
  document.getElementById("speedLabel").textContent = l;
}

function updatePitchLabel(v) {
  v = parseFloat(v);
  let l = v <= 0.7 ? "低い" : v <= 1.2 ? "普通" : v <= 1.6 ? "高い" : "とても高い";
  document.getElementById("pitchLabel").textContent = l;
}

function updateHoldLabel(v) {
  document.getElementById("holdLabel").textContent = (parseInt(v) / 1000).toFixed(1) + "秒";
}

// ===== Events =====
document.getElementById("btnBack").addEventListener("click", goHome);
document.getElementById("btnTheme").addEventListener("click", toggleTheme);
document.getElementById("btnFullscreen").addEventListener("click", toggleFullscreen);
document.getElementById("btnSettings").addEventListener("click", openSettings);
document.getElementById("btnSettingsCancel").addEventListener("click", closeSettings);
document.getElementById("btnSettingsSave").addEventListener("click", saveSettings);
document.getElementById("btnRepeat").addEventListener("click", () => { if (lastSpokenText) speak(lastSpokenText, null); });

document.getElementById("speedSlider").addEventListener("input", e => updateSpeedLabel(e.target.value));
document.getElementById("pitchSlider").addEventListener("input", e => updatePitchLabel(e.target.value));
document.getElementById("holdSlider").addEventListener("input", e => updateHoldLabel(e.target.value));

document.getElementById("settingsOverlay").addEventListener("click", e => {
  if (e.target === document.getElementById("settingsOverlay")) closeSettings();
});

if ("speechSynthesis" in window) {
  window.speechSynthesis.onvoiceschanged = loadVoices;
  loadVoices();
}

// ===== Init =====
applyTheme();
render();
</script>
</body>
</html>
